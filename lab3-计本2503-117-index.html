<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录注册</title>
    <link rel="stylesheet" href="css/lab3-计本2503-117-index.css">
</head>
<body>
    <button id="openBtn">打开登录</button>

    <div id="loginBox">
        <div class="box-content">
            <span id="closeBtn">×</span>

            <div id="loginForm">
                <h3>登录</h3>
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码">
                <button id="loginSubmit">登录</button>
                <p>没有账号？<a href="javascript:;" id="toReg">立即注册</a></p>
            </div>

            <div id="regForm">
                <h3>注册</h3>
                <input type="text" id="regUser" placeholder="设置用户名">
