<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字图书展销平台</title>
    <link rel="stylesheet" href="css/lab4-2503-117-index.css">
</head>
<body>
    <header class="header">
        <div class="icons">
            <img src="img/cart.png" alt="购物车" class="icon">
            <img src="img/search.png" alt="搜索" class="icon">
        </div>
        <button class="login-btn" onclick="openLogin()">打开登录</button>
    </header>

    <div class="login-modal" id="loginModal">
        <div class="modal-content">
            <span class="close" onclick="closeLogin()">&times;</span>
            <div id="loginBox">
                <h3>登录</h3>
                <input type="text" id="loginUser" placeholder="用户名">
                <input type="password" id="loginPwd" placeholder="密码">
                <button onclick="login()">登录</button>
                <p>没有账号？<a href="javascript:showRegister()">立即注册</a></p>
            </div>
            <div id="registerBox" style="display: none;">
                <h3>注册</h3>
                <input type="text" id="regUser" placeholder="用户名">
                <input type="password" id="regPwd" placeholder="密码">
                <button onclick="register()">注册</button>
                <p>已有账号？<a href="javascript:showLogin()">立即登录</a></p>
            </div>
        </div>
    </div>

    <div class="banner">
        <div class="banner-img">
            <img src="img/book1.jpg" alt="图书1">
            <img src="img/book2.jpg" alt="图书2">
            <img src="img/book3.jpg" alt="图书3">
        </div>
    </div>

    <div class="hot-books">
        <h2>热门图书</h2>
        <div class="book-item">
            <img src="img/book1.jpg" alt="图书1">
        </div>
        <div class="book-item">
            <img src="img/book2.jpg" alt="图书2">
        </div>
        <div class="book-item">
            <img src="img/book3.jpg" alt="图书3">
        </div>
    </div>

    <script>
        function openLogin() {
            document.getElementById("loginModal").style.display = "block";
        }
        function closeLogin() {
            document.getElementById("loginModal").style.display = "none";
        }
        function showRegister() {
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("registerBox").style.display = "block";
        }
        function showLogin() {
            document.getElementById("registerBox").style.display = "none";
            document.getElementById("loginBox").style.display = "block";
        }

        function register() {
            let username = document.getElementById("regUser").value;
            let password = document.getElementById("regPwd").value;
            if (!username || !password) {
                alert("用户名和密码不能为空！");
                return;
            }
 if (localStorage.getItem(username)) {
                alert("该用户已存在！");
                return;
            }
            localStorage.setItem(username, password);
            alert("注册成功！请登录");
            showLogin();
        }

        function login() {
            let username = document.getElementById("loginUser").value;
            let password = document.getElementById("loginPwd").value;
            let pwd = localStorage.getItem(username);
            if (pwd && pwd === password) {
                alert("登录成功！");
                closeLogin();
            } else {
                alert("用户名或密码错误！");
            }
        }
    </script>
</body>
</html>
